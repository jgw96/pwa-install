<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>Stencil Component Starter</title>

  <script type="module" src="/build/pwa-install.esm.js"></script>
  <script nomodule src="/build/pwa-install.js"></script>

  <link rel="manifest" href="/assets/test-manifest.webmanifest">

</head>

<body>

  <pwa-install iconPath="https://webboard-app.web.app/assets/icon/256.png"
    manifestPath="/assets/test-manifest.webmanifest"></pwa-install>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (registration) {
          // Registration was successful
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, function (err) {
          // registration failed :(
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>

</body>

</html>
